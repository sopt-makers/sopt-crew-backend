AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  sopt-crew-backend
  Spring Boot 3 + AWS Lambda (SnapStart enabled)
  Dev environment deployment template

Globals:
  Function:
    Timeout: 30
    MemorySize: 2048
    Runtime: java17
    Architectures:
      - x86_64

Resources:
  CrewApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      EndpointConfiguration: REGIONAL
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'*'"
        AllowMethods: "'*'"
        AllowCredentials: "'false'"

  CrewApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: crew-dev-api
      CodeUri: ../main/build/distributions/main-lambda.zip
      Handler: org.sopt.makers.crew.main.global.config.lambda.LambdaHandler::handleRequest
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          SPRING_MAIN_WEB_APPLICATION_TYPE: servlet
          SPRING_PROFILES_ACTIVE: lambda-dev
          JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
      # VpcConfig:
      #   SecurityGroupIds:
      #     - sg-xxxxxxxx  # TODO: Redis 접근 가능한 Security Group ID로 변경
      #   SubnetIds:
      #     - subnet-xxxxxxxx  # TODO: Redis와 통신 가능한 Subnet ID로 변경
      Events:
        RootPath:
          Type: Api
          Properties:
            RestApiId: !Ref CrewApiGateway
            Path: /
            Method: ANY
        ProxyPath:
          Type: Api
          Properties:
            RestApiId: !Ref CrewApiGateway
            Path: /{proxy+}
            Method: ANY

Outputs:
  CrewApiEndpoint:
    Description: "API Gateway endpoint URL for Dev environment"
    Value: !Sub "https://${CrewApiGateway}.execute-api.${AWS::Region}.amazonaws.com/dev/"
  CrewApiFunctionArn:
    Description: "Lambda Function ARN"
    Value: !GetAtt CrewApiFunction.Arn
